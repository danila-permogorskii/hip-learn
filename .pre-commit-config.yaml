# Pre-commit configuration — aligned with ROCm rocm-libraries standards
# See https://github.com/ROCm/rocm-libraries/blob/develop/.pre-commit-config.yaml

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        language_version: python3

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format (C/C++/HIP)
        entry: clang-format -i -style=file
        language: system
        files: '\.(c|cpp|cc|h|hpp|hip)(\.in)?$'

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.10
    hooks:
      - id: cmake-lint
